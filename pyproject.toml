[project]
name = "StealthPlex"
version = "0.1.0"
description = "Multi-engine HTTP fetch orchestrator with optional fallback chains."
requires-python = ">=3.11"
dependencies = []

[project.optional-dependencies]
wreq = ["wreq"]
curl_cffi = ["curl-cffi"]
cloudscraper = ["cloudscraper"]
stealthplex = ["scrapling[fetchers]"]
seleniumbase = ["seleniumbase"]
all = ["wreq", "curl-cffi", "cloudscraper", "scrapling[fetchers]", "seleniumbase"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["StealthPlex"]

[tool.hatch.build]
include = ["StealthPlex/py.typed", "StealthPlex/**/*.pyi"]
